site_name: Apiary
site_description: A modular, extensible FastAPI framework for building configurable REST APIs
site_author: Apiary Contributors
repo_url: https://github.com/lancereinsmith/apiary
repo_name: apiary

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Configuration: getting-started/configuration.md
  - User Guide:
    - Overview: guide/overview.md
    - Adding Endpoints: guide/adding-endpoints.md
    - Creating Services: guide/creating-services.md
    - Authentication: guide/authentication.md
    - Built-in Endpoints: guide/builtin-endpoints.md
    - Configurable Endpoints: guide/configurable-endpoints.md
  - Development:
    - Development Setup: development/setup.md
    - CLI Reference: development/cli.md
    - Testing: development/testing.md
    - Code Quality: development/code-quality.md
    - Project Structure: development/structure.md
  - Deployment:
    - Overview: deployment/overview.md
    - Server Setup: deployment/server-setup.md
    - Configuration: deployment/configuration.md
    - Monitoring: deployment/monitoring.md
  - Reference:
    - Core Modules: reference/core.md
    - Services: reference/services.md
    - Models: reference/models.md
    - Configuration Options: reference/config.md
  - About:
    - Overview: about/summary.md
    - Changelog: about/changelog.md
    - Contributing: about/contributing.md
    - License: about/license.md

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lancereinsmith/apiary

